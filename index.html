<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR 背景オクルージョン（完全版）</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      touch-action: none;
    }
    #snap-btn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      font-size: 16px;
      background-color: #ff69b4;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      z-index: 1000;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      font-weight: bold;
    }
    #snap-btn:active {
      background-color: #ff1493;
    }
    /* 一番手前に重ねる、人間だけを描画するキャンバス */
    #person-overlay-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 999; /* ARシーン(A-Frame)よりも手前に配置 */
      pointer-events: none; /* タッチイベントを貫通させてAR操作を可能にする */
    }
    a-scene {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
  </style>
</head>
<body>

  <button id="snap-btn">写真を撮る</button>
  <canvas id="person-overlay-canvas"></canvas>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" screenshot>
    <a-assets>
      <img id="egypt-img" src="egypt.png">
    </a-assets>

    <a-image id="ar-object" src="#egypt-img" position="0 0 -4" width="2" height="2"></a-image>

    <a-entity camera></a-entity>
  </a-scene>

<script>
// ==========================================
// 1. リアルタイム人物切り抜き＆最前面描画処理
// ==========================================
const overlayCanvas = document.getElementById('person-overlay-canvas');
const oCtx = overlayCanvas.getContext('2d');

// 一時処理用の隠しキャンバス
const hiddenCanvas = document.createElement('canvas');
const hCtx = hiddenCanvas.getContext('2d');

let bpModel = null;

// AIモデル（BodyPix）の読み込み
bodyPix.load({
  architecture: 'MobileNetV1',
  outputStride: 16,
  multiplier: 0.50, // 処理軽量化のため少し下げています
  quantBytes: 2
}).then(model => {
  bpModel = model;
  startOcclusionLoop();
});

function startOcclusionLoop() {
  const video = document.querySelector('video');
  if (!video) {
    // カメラ（video要素）が生成されるまで待つ
    setTimeout(startOcclusionLoop, 100);
    return;
  }

  async function render() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      const width = window.innerWidth;
      const height = window.innerHeight;
      
      if (overlayCanvas.width !== width || overlayCanvas.height !== height) {
        overlayCanvas.width = width;
        overlayCanvas.height = height;
        hiddenCanvas.width = width;
        hiddenCanvas.height = height;
      }

      // 1. 隠しキャンバスに現在のカメラ映像をそのまま描画
      hCtx.drawImage(video, 0, 0, width, height);

      try {
        // 2. AIで人物の領域（マスク）を検出
        const segmentation = await bpModel.segmentPerson(video, {
          flipHorizontal: false,
          internalResolution: 'low', // 速度優先
          segmentationThreshold: 0.6
        });

        // 3. カメラ映像のピクセルデータを取得
        const imgData = hCtx.getImageData(0, 0, width, height);
        const data = imgData.data;

        // 4. 人物以外のエリア（背景）の透明度（Alpha）を0にする
        for (let y = 0; y < height; y++) {
          for (let x = 0; x < width; x++) {
            const vx = Math.floor(x * (segmentation.width / width));
            const vy = Math.floor(y * (segmentation.height / height));
            const segIndex = vy * segmentation.width + vx;
            
            const pixelIndex = (y * width + x) * 4;
            
            // 値が 0 の場所は「背景（人じゃない）」なので透明にする
            if (segmentation.data[segIndex] === 0) {
              data[pixelIndex + 3] = 0; 
            }
          }
        }

        // 5. 切り抜いた「人間だけ」を、ARの上にある最前面キャンバスに描画！
        oCtx.clearRect(0, 0, width, height);
        oCtx.putImageData(imgData, 0, 0);

      } catch (e) {
        console.error(e);
      }
    }
    requestAnimationFrame(render);
  }
  render();
}

// ==========================================
// 2. 指定の指操作（1本全方向回転・2本拡大縮小・3本移動）
// ==========================================
const arObject = document.getElementById('ar-object');
let startX = 0, startY = 0;
let startRotationX = 0, startRotationY = 0;
let startDist = 0;
let startScaleX = 1, startScaleY = 1;
let startObjX = 0, startObjY = 0;
let startTouchPos3 = { x: 0, y: 0 };

window.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

window.addEventListener('touchstart', function(e) {
  if (e.touches.length === 1) {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    const currentRot = arObject.getAttribute('rotation') || { x: 0, y: 0, z: 0 };
    startRotationX = currentRot.x;
    startRotationY = currentRot.y;
  } else if (e.touches.length === 2) {
    startDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const currentScale = arObject.getAttribute('scale') || { x: 1, y: 1, z: 1 };
    startScaleX = currentScale.x;
    startScaleY = currentScale.y;
  } else if (e.touches.length === 3) {
    startTouchPos3.x = (e.touches[0].clientX + e.touches[1].clientX + e.touches[2].clientX) / 3;
    startTouchPos3.y = (e.touches[0].clientY + e.touches[1].clientY + e.touches[2].clientY) / 3;
    const currentPos = arObject.getAttribute('position') || { x: 0, y: 0, z: -4 };
    startObjX = currentPos.x;
    startObjY = currentPos.y;
  }
});

window.addEventListener('touchmove', function(e) {
  if (e.touches.length === 1 && startX !== 0) {
    const deltaX = e.touches[0].clientX - startX;
    const deltaY = e.touches[0].clientY - startY;
    arObject.setAttribute('rotation', `${startRotationX + (deltaY * 0.5)} ${startRotationY + (deltaX * 0.5)} 0`);
  } else if (e.touches.length === 2 && startDist !== 0) {
    const currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const factor = currentDist / startDist;
    arObject.setAttribute('scale', `${Math.max(0.2, Math.min(5.0, startScaleX * factor))} ${Math.max(0.2, Math.min(5.0, startScaleY * factor))} 1`);
  } else if (e.touches.length === 3 && startTouchPos3.x !== 0) {
    const currentTouchX = (e.touches[0].clientX + e.touches[1].clientX + e.touches[2].clientX) / 3;
    const currentTouchY = (e.touches[0].clientY + e.touches[1].clientY + e.touches[2].clientY) / 3;
    arObject.setAttribute('position', `${startObjX + ((currentTouchX - startTouchPos3.x) * 0.012)} ${startObjY - ((currentTouchY - startTouchPos3.y) * 0.012)} -4`);
  }
});

window.addEventListener('touchend', function(e) {
  if (e.touches.length < 3) startTouchPos3 = { x: 0, y: 0 };
  if (e.touches.length < 2) startDist = 0;
  if (e.touches.length < 1) { startX = 0; startY = 0; }
});

// ==========================================
// 3. 写真撮影（キャプチャ）の処理
// ==========================================
document.getElementById('snap-btn').addEventListener('click', function() {
  const scene = document.querySelector('a-scene');
  if (!scene || !scene.components.screenshot) {
    alert('AR機能の読み込み中です。');
    return;
  }
  const targetCanvas = scene.components.screenshot.getCanvas('perspective');
  const video = document.querySelector('video');
  
  const mergeCanvas = document.createElement('canvas');
  mergeCanvas.width = window.innerWidth;
  mergeCanvas.height = window.innerHeight;
  const mCtx = mergeCanvas.getContext('2d');
  
  // 1. 一番後ろに「生のカメラ映像」を描画
  if (video) {
    mCtx.drawImage(video, 0, 0, window.innerWidth, window.innerHeight);
  }
  // 2. 真ん中に「ARオブジェクト（エジプト画像）」を描画
  if (targetCanvas) {
    mCtx.drawImage(targetCanvas, 0, 0, window.innerWidth, window.innerHeight);
  }
  // 3. 一番手前に「切り抜いた人間」を描画して合成
  mCtx.drawImage(overlayCanvas, 0, 0);
  
  try {
    const imgData = mergeCanvas.toDataURL('image/png');
    const link = document.createElement('a');
    link.download = 'ar-back-photo_' + Date.now() + '.png';
    link.href = imgData;
    link.click();
  } catch (e) {
    alert('スクリーンショット機能で撮影してください。');
  }
});
</script>
</body>
</html>
